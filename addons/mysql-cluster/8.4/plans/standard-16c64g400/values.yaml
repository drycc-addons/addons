## @param fullnameOverride String to fully override common.names.fullname template
##
fullnameOverride: hb-mysql-cluster-standard-400

## MinIO&reg; containers' resource requests and limits
## ref: https://kubernetes.io/docs/user-guide/compute-resources/
## We usually recommend not to specify default resources and to leave this as a conscious
## choice for the user. This also increases chances charts run on environments with little
## resources, such as Minikube. If you do want to specify resources, uncomment the following
## lines, adjust them as necessary, and remove the curly braces after 'resources:'.
## @param resources.limits The resources limits for the MinIO&reg; container
## @param resources.requests The requested resources for the MinIO&reg; container
##
primary: 
  extraConfig: |
    [mysqld]
    innodb_io_capacity=2000
    innodb_io_capacity_max=3000
    max_connect_errors=1000000
    open_files_limit=2000000                                     
    performance_schema_max_table_instances=200
    thread_cache_size=0
    innodb_flush_method=O_DIRECT
    innodb_read_io_threads=32               
    innodb_write_io_threads=32
    innodb_buffer_pool_instances=16
    innodb_buffer_pool_size=42949672960
    max_connections=16000
  resources:
    limits:
      cpu: 16000m
      memory: 64Gi
    requests:
      cpu: 100m
      memory: 1Gi

## @section Persistence parameters

## Enable persistence using Persistent Volume Claims
## ref: https://kubernetes.io/docs/user-guide/persistent-volumes/
##
  persistence:
    size: 400Gi

router:
  replicaCount: 4
  configuration: |-
    [DEFAULT]
    max_total_connections = 3900
    [routing:bootstrap_rw]
    max_connections= 3900
  resources:
    limits: 
      cpu: 1600m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 1Gi